name: stokwarung
description: "StokWarung - Aplikasi manajemen stok dan POS untuk warung mikro"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Backend Service
  supabase_flutter: ^2.8.4

  # Utilities
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # Charts
  fl_chart: ^0.70.2

  # Barcode Scanner
  mobile_scanner: ^6.0.5
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
